<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Yeni Yorum</title></head>
<body style="font-family:Arial,sans-serif;background:#f4f4f4;padding:20px;margin:0">
  <div style="max-width:600px;margin:0 auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08)">
    <div style="background:#1a1a2e;padding:20px;color:#fff;font-size:20px;font-weight:bold">SPMS</div>
    <div style="padding:24px">
      <p style="font-size:16px;color:#333;margin-top:0">Merhaba <strong>{{ recipient_name }}</strong>,</p>
      <p style="font-size:15px;color:#555">
        <strong>{{ actor_name }}</strong> aşağıdaki göreve yorum ekledi:
      </p>
      <p style="font-size:18px;font-weight:bold;color:#1a1a2e;background:#f0f4ff;padding:12px 16px;border-radius:6px;border-left:4px solid #4f46e5">
        {{ task_title }}
      </p>
      <div style="background:#fafafa;border:1px solid #e8e8e8;border-radius:6px;padding:14px;margin-top:12px">
        <p style="font-size:14px;color:#444;margin:0;font-style:italic">"{{ comment_preview }}"</p>
      </div>
      <p style="text-align:center;margin-top:24px">
        <a href="{{ task_url }}"
           style="display:inline-block;background:#4f46e5;color:#fff;padding:12px 28px;border-radius:6px;text-decoration:none;font-size:15px;font-weight:bold">
          Yorumu Görüntüle
        </a>
      </p>
    </div>
    <div style="padding:16px;background:#f4f4f4;font-size:12px;color:#666;text-align:center">
      SPMS Bildirim Servisi
    </div>
  </div>
</body>
</html>
