[pytest]
pythonpath = .
testpaths = tests
asyncio_mode = auto
# Fake-pass guardrail (P1): a bare @pytest.mark.xfail is STRICT by default, so a
# test marked "expected to fail" that unexpectedly PASSES fails the suite loudly
# instead of slipping by as a silent xpass. Explicit xfail(strict=False) is
# additionally banned by tests/test_fake_pass_guards.py.
xfail_strict = true
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
